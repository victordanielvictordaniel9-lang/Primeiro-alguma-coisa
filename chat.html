  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0267ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0d65d9;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1 style="text-align: center;">Sistema ESF</h1>
    <h2>Login</h2>

    <form>
      <input type="email" placeholder="Digite seu email" required>

      <input type="password" placeholder="Digite sua senha" required>

      <button type="submit">Entrar</button>
    </form>
  </div>


  
</body>
</html>
