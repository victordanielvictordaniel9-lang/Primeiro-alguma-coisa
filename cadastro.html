<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Cadastre-se</h2>
            <p>Crie sua conta para continuar</p>
            
            
            <div class="input-group">
                <label for="password">*Nome Completo</label>
                <input type="text" id="nome" placeholder="*Escreva aqui" required>
            </div>
            
            <div class="input-group">
                <label for="password">*Data de Nascimento</label>
                <input type="number" id="idade" placeholder="*Escreva aqui" required>
            </div>

            <div class="input-group">
                <label for="email">Crie um email</label>
                <input type="email" id="email" placeholder="*Escreva aqui" required>
            </div>

            <div class="input-group">
                <label for="email">Crie sua senha </label>
                <input type="email" id="email" placeholder="*Escreva aqui" required>
            </div>

            <div class="input-group">
                <label for="password">Confirme sua senha</label>
                <input type="password" id="password" placeholder="*Escreva aqui" required>
            </div>
            
            <div class="footer-links">
                 <button type="submit" class="login-button">Entrar</button>
                 <br><br>
                <a href="#">Esqueceu a senha?</a>
                <span>Já tem conta? <a href="login_chat.html">Login</a></span>
            </div>
        </form>
    </div>
</body>
</html>
