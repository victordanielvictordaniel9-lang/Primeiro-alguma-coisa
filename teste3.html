<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema ESF</title>

    <style>

        body{
            margin:0;
            font-family: Arial;
        }

        .container{
            display:flex;
            height:100vh;
        }

       
        .sidebar{
            width:120px;
            background: linear-gradient(to bottom, #1f2a5a, #3b82f6);
        }

       
        .conteudo{
            flex:1;
            background:#f2f2f2;
        }

        .topo{
            height:100px;
            background: linear-gradient(to right, #1f2a5a, #3b82f6);
            color:white;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:45px;
            font-weight:bold;
        }

    </style>
</head>
<body>
 <div>
       
    <div class="container">

        <!-- Barra lateral -->
        <div class="sidebar"></div>

        <!-- Conteúdo -->
        <div class="conteudo">

            <div class="topo">
                Sistema ESF
            </div>

            <form id="formulario" method="POST" style="display: flex; align-items: center; justify-content: center; flex-direction:column;">

                <label>Email:</label>
                <input type="text" name="email" id="email"><br><br>

                <label >Senha:</label>
                <input type="password" name="semha" id="senha"><br><br>

                <button type="submit" id="logar">Enviar</button>

                

            </form>
        </div>

    </div>

</body>
</html>
